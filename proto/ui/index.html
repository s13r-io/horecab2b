<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM Procurement Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>NAM Procurement</h1>
                <div class="header-actions">
                    <a href="dashboard.html" class="btn-dashboard">Dashboard</a>
                    <button id="forecastBtn" class="btn-forecast">Run Morning Forecast</button>
                </div>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chatContainer" class="chat-container">
            <!-- Messages will be inserted here -->
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input
                id="messageInput"
                type="text"
                placeholder="Type your message..."
                autocomplete="off"
            >
            <button id="sendBtn" class="btn-send">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
